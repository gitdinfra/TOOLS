<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pfSense PPPoE Credential Decoder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #808080; 
        }
        .code-font { 
            font-family: 'Courier New', Courier, monospace; 
        }
        .input-bg { 
            background-color: #36454F !important; 
            color: #20c20e !important; 
        }
        .dimmed-card {
            background-color: #2d3748;
            border-color: #4a5568;
        }
        .copy-btn:active, .util-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto dimmed-card p-6 rounded-xl shadow-2xl border">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-white mb-1">PFSENSE PPPoE Credential Extractor</h1>
                <p class="text-slate-300 text-sm">Paste the <code>&lt;ppps&gt;</code> section from your pfSense config.</p>
            </div>
            <div class="flex gap-2">
                <button onclick="pasteFromClipboard()" class="util-btn flex items-center bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    Paste
                </button>
                <button onclick="clearContent()" class="util-btn flex items-center bg-slate-600 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    Clear
                </button>
            </div>
        </div>
        
        <textarea 
            id="xmlInput" 
            class="w-full h-48 p-4 rounded-lg code-font text-sm focus:ring-2 focus:ring-green-500 outline-none mb-6 input-bg border-none shadow-inner resize-none"
            placeholder="Paste <ppps> snippet here..."></textarea>

        <div id="resultArea" class="hidden">
            <div class="flex justify-between items-center mb-3 border-b border-slate-600 pb-2">
                <h2 class="text-lg font-semibold text-slate-200">Decoded Results</h2>
                <span id="copyToast" class="text-xs text-green-400 opacity-0 transition-opacity duration-300">Copied!</span>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-700 border border-slate-700 rounded-lg">
                    <thead class="bg-slate-800">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Interface</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Provider</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Username</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Plaintext Password</th>
                        </tr>
                    </thead>
                    <tbody id="resultTableBody" class="bg-slate-900 divide-y divide-slate-700 text-sm text-white">
                        <!-- Results -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Buffer for copy operations -->
    <textarea id="copyBuffer" class="fixed -top-full opacity-0"></textarea>

    <script>
        const input = document.getElementById('xmlInput');
        const resultArea = document.getElementById('resultArea');
        const tableBody = document.getElementById('resultTableBody');
        const copyBuffer = document.getElementById('copyBuffer');
        const copyToast = document.getElementById('copyToast');

        input.addEventListener('input', processXML);

        async function pasteFromClipboard() {
            try {
                // Using clipboard API for the primary paste action
                const text = await navigator.clipboard.readText();
                input.value = text;
                processXML();
            } catch (err) {
                // Note: Navigator clipboard might be blocked in some iframe contexts
                console.error('Clipboard access denied');
            }
        }

        function clearContent() {
            input.value = '';
            resultArea.classList.add('hidden');
            tableBody.innerHTML = '';
        }

        function showToast(msg = "Copied!") {
            copyToast.innerText = msg;
            copyToast.style.opacity = '1';
            setTimeout(() => { copyToast.style.opacity = '0'; }, 2000);
        }

        window.copyText = function(text, btnElement) {
            copyBuffer.value = text;
            copyBuffer.select();
            try {
                document.execCommand('copy');
                showToast();
                const originalIcon = btnElement.innerHTML;
                btnElement.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>`;
                btnElement.classList.replace('text-slate-400', 'text-green-400');
                setTimeout(() => {
                    btnElement.innerHTML = originalIcon;
                    btnElement.classList.replace('text-green-400', 'text-slate-400');
                }, 1500);
            } catch (err) { console.error('Copy failed', err); }
        };

        function processXML() {
            const xmlText = input.value.trim();
            if (!xmlText) {
                resultArea.classList.add('hidden');
                return;
            }

            try {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(`<root>${xmlText}</root>`, "text/xml");
                const pppNodes = xmlDoc.getElementsByTagName("ppp");
                
                tableBody.innerHTML = '';
                
                if (pppNodes.length > 0) {
                    resultArea.classList.remove('hidden');
                    Array.from(pppNodes).forEach(node => {
                        const iface = node.getElementsByTagName("if")[0]?.textContent || "N/A";
                        const provider = node.getElementsByTagName("provider")[0]?.textContent || "General";
                        const username = node.getElementsByTagName("username")[0]?.textContent || "N/A";
                        const encodedPass = node.getElementsByTagName("password")[0]?.textContent || "";
                        
                        let decodedPass = "Error";
                        try {
                            decodedPass = atob(encodedPass.trim());
                        } catch (e) {
                            decodedPass = "Invalid Base64";
                        }

                        const row = document.createElement('tr');
                        row.className = "hover:bg-slate-800 transition-colors";
                        row.innerHTML = `
                            <td class="px-4 py-3 font-mono text-green-400 border-r border-slate-800">${iface}</td>
                            <td class="px-4 py-3 text-slate-300 border-r border-slate-800">${provider}</td>
                            <td class="px-4 py-3 border-r border-slate-800">
                                <div class="flex items-center justify-between">
                                    <span class="truncate mr-2">${username}</span>
                                    <button onclick="copyText('${username}', this)" class="p-1 text-slate-400 hover:text-white transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                        </svg>
                                    </button>
                                </div>
                            </td>
                            <td class="px-4 py-3">
                                <div class="flex items-center justify-between">
                                    <code class="bg-slate-700 px-2 py-1 rounded text-green-400 font-bold border border-slate-600 truncate mr-2">${decodedPass}</code>
                                    <button onclick="copyText('${decodedPass.replace(/'/g, "\\'")}', this)" class="p-1 text-slate-400 hover:text-white transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                        </svg>
                                    </button>
                                </div>
                            </td>
                        `;
                        tableBody.appendChild(row);
                    });
                }
            } catch (err) { console.error("Parsing error", err); }
        }
    </script>
</body>
</html>
